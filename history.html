<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>History — CheckGen</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="app-shell">
  <button class="mobile-nav-toggle" onclick="toggleMobileNav()">☰</button>
  <aside id="appNav"></aside>
  <main class="app-content">

    <div class="page-header">
      <h1 class="page-title">History</h1>
      <p class="page-sub">Your cloud-saved checklists. Pick up where you left off.</p>
    </div>

    <div id="historyContent">
      <div class="empty" style="padding:var(--sp-10)">
        <div style="font-size:24px;margin-bottom:var(--sp-3)">⏳</div>
        Loading your history…
      </div>
    </div>

  </main>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script>
(async () => {
  const ctx = await initPage(true);
  if (!ctx) return;
  const { user } = ctx;
  const el = document.getElementById('historyContent');
  const sb = getSB();

  try {
    // Load from Supabase
    const { data: cloudSessions, error } = await sb
      .from('checklist_sessions')
      .select('*')
      .eq('user_id', user.id)
      .eq('session_type', 'personal')
      .order('updated_at', { ascending: false })
      .limit(50);

    if (error) throw new Error(error.message);

    // Also load localStorage sessions as fallback
    let localSessions = [];
    try {
      const hist = JSON.parse(localStorage.getItem('cg_history') || '[]');
      localSessions = hist.map(h => ({
        id: 'local-' + h.ts,
        name: h.name || null,
        ticket_id: h.ticketId || null,
        environment: h.env || null,
        items: h.checklist || [],
        created_at: new Date(h.ts).toISOString(),
        updated_at: new Date(h.ts).toISOString(),
        _local: true,
      }));
    } catch(e) {}

    // Merge: cloud first, then local sessions not in cloud
    const allSessions = [...(cloudSessions || [])];
    // Add local sessions that don't have a cloud counterpart
    if (!allSessions.length && localSessions.length) {
      allSessions.push(...localSessions);
    }

    if (!allSessions.length) {
      el.innerHTML = `
        <div class="empty" style="padding:var(--sp-10)">
          <div style="font-size:24px;margin-bottom:var(--sp-3)">📋</div>
          No saved checklists yet.<br>
          <a href="/app/" style="color:var(--green)">Generate your first one →</a>
        </div>`;
      return;
    }

    // Render sessions
    el.innerHTML = `<div class="history-grid" id="historyGrid"></div>`;
    const grid = document.getElementById('historyGrid');

    allSessions.forEach(s => {
      const items = Array.isArray(s.items) ? s.items : [];
      const total = items.length;
      const pass = items.filter(i => i.outcome === 'pass').length;
      const fail = items.filter(i => i.outcome === 'fail').length;
      const blocked = items.filter(i => i.outcome === 'blocked').length;
      const actioned = pass + fail + blocked;
      const pct = total ? Math.round((actioned / total) * 100) : 0;
      const isComplete = total > 0 && actioned === total;
      const date = new Date(s.updated_at || s.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

      const card = document.createElement('div');
      card.className = 'history-card card';
      card.style.cursor = 'pointer';
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--sp-2)">
          <div style="font-family:var(--font-mono);font-size:clamp(9px,.62vw,11px);letter-spacing:.1em;text-transform:uppercase;color:${s._local ? 'var(--muted)' : 'var(--green)'}">${s._local ? 'Local' : 'Cloud'}</div>
          <span style="font-family:var(--font-mono);font-size:clamp(9px,.62vw,11px);color:var(--muted)">${date}</span>
        </div>
        <div style="font-size:clamp(13px,.88vw,15px);font-weight:500;color:var(--text);margin-bottom:var(--sp-1)">${esc(s.name || 'Untitled checklist')}</div>
        ${s.ticket_id ? `<div style="font-family:var(--font-mono);font-size:clamp(10px,.68vw,12px);color:var(--muted);margin-bottom:var(--sp-2)">${esc(s.ticket_id)}</div>` : ''}
        ${total > 0 ? `
          <div style="display:flex;gap:var(--sp-2);font-family:var(--font-mono);font-size:clamp(9px,.62vw,11px);letter-spacing:.06em;margin-bottom:var(--sp-2)">
            <span style="color:var(--pass)">${pass}P</span>
            <span style="color:var(--fail)">${fail}F</span>
            <span style="color:var(--blocked)">${blocked}B</span>
            <span style="color:var(--muted)">${actioned}/${total}</span>
            ${isComplete ? '<span style="color:var(--green)">✓ Complete</span>' : ''}
          </div>
          <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--green);transition:width .3s"></div>
          </div>
        ` : '<div style="font-size:clamp(11px,.72vw,13px);color:var(--muted)">0 items</div>'}`;
      grid.appendChild(card);
    });
  } catch(e) {
    el.innerHTML = `<div class="status error">Failed to load history: ${e.message}</div>`;
  }
})();

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>

<div style="text-align:center;padding:var(--sp-6) 0 var(--sp-8);margin-left:280px">
  <div style="display:flex;justify-content:center;gap:var(--sp-5);margin-bottom:var(--sp-2)">
    <a href="/terms.html" style="font-family:var(--font-mono);font-size:clamp(10px,.68vw,12px);letter-spacing:.08em;color:var(--muted);text-decoration:none">Terms of Service</a>
    <a href="/privacy.html" style="font-family:var(--font-mono);font-size:clamp(10px,.68vw,12px);letter-spacing:.08em;color:var(--muted);text-decoration:none">Privacy Policy</a>
  </div>
  <span style="font-family:var(--font-mono);font-size:clamp(10px,.68vw,12px);letter-spacing:.08em;color:var(--muted)">© 2026 <a href="https://calebthede.com" style="color:var(--green);text-decoration:none">Caleb Thede</a></span>
</div>
</body>
</html>
