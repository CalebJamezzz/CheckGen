<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CheckGen — Checklist</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js">
// ── Resume last incomplete session ──────────────────────────────────────────
async function loadResumePanel(userId) {
  try {
    const sb = getSB();
    if (!sb) return;
    const { data, error } = await sb
      .from('checklist_sessions')
      .select('id, name, ticket_id, items, updated_at')
      .eq('user_id', userId)
      .eq('session_type', 'personal')
      .order('updated_at', { ascending: false })
      .limit(1);
    if (error || !data?.length) return;
    const last = data[0];
    const items = Array.isArray(last.items) ? last.items : [];
    const incomplete = items.filter(i => !i.outcome || i.outcome === '').length;
    if (incomplete === 0 || items.length === 0) return; // fully completed, skip
    const panel = document.getElementById('resumePanel');
    if (!panel) return;
    const title = last.name || last.ticket_id || 'Untitled checklist';
    const date  = new Date(last.updated_at).toLocaleDateString('en-US', { month:'short', day:'numeric' });
    document.getElementById('resumeTitle').textContent = title;
    document.getElementById('resumeMeta').textContent  = `${incomplete} of ${items.length} item${items.length !== 1 ? 's' : ''} remaining · ${date}`;
    panel.style.display = 'block';
    panel.dataset.sessionId = last.id;
  } catch(e) { /* silent — resume is a nicety not a requirement */ }
}

function resumeLastSession() {
  const id = document.getElementById('resumePanel')?.dataset.sessionId;
  if (id) location.href = '/history.html?session=' + id;
}
function dismissResume() {
  const p = document.getElementById('resumePanel');
  if (p) { p.style.display = 'none'; p.dataset.sessionId = ''; }
}

</script>
</head>
<body>
<div class="app-shell">
  <button class="mobile-nav-toggle" onclick="toggleMobileNav()">☰</button>
  <aside id="appNav"></aside>

  <main class="app-content">

    <!-- Anon generation gate -->
    <div class="anon-gate" id="anonGate" style="display:none">
      <div>
        <div class="anon-gate-text">
          <strong id="anonRemaining">3 free generations</strong> remaining — <a href="/signup.html" style="color:var(--green)">create a free account</a> for unlimited access and cloud history.
        </div>
        <div class="anon-count-bar" id="anonPips"></div>
      </div>
      <a href="/signup.html" class="btn btn-outline" style="flex-shrink:0">Sign up free →</a>
    </div>

    <!-- Screen 1 — Welcome -->
    <div class="screen active" id="screen1">
      <!-- Page header — changes based on auth state -->
      <div style="margin-bottom:var(--sp-6)" id="screen1Header">
        <p class="eyebrow" style="margin-bottom:var(--sp-3)">✦ Test Planning</p>
        <h1 style="margin-bottom:var(--sp-3)">Generate your<br>checklist.</h1>
        <p style="font-size:clamp(15px,1.1vw,17px);color:var(--dim);max-width:560px;line-height:1.7">
          Paste your ticket or AC, select testing areas, and get a grouped QA checklist in seconds.
        </p>
      </div>

      <!-- Resume last session — shown only for signed-in users with incomplete session -->
      <div id="resumePanel" style="display:none;margin-bottom:var(--sp-5)">
        <div class="panel" style="border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.04)">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--sp-3)">
            <div>
              <div style="font-family:var(--font-mono);font-size:clamp(10px,.7vw,12px);letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:4px">Continue where you left off</div>
              <div id="resumeTitle" style="font-size:clamp(14px,.95vw,16px);color:var(--text);font-weight:500"></div>
              <div id="resumeMeta" style="font-size:clamp(11px,.75vw,13px);color:var(--muted);margin-top:2px"></div>
            </div>
            <div style="display:flex;gap:var(--sp-2);flex-shrink:0">
              <button class="btn btn-primary btn-sm" onclick="resumeLastSession()">Resume →</button>
              <button class="btn btn-ghost btn-sm" onclick="dismissResume()">New instead</button>
            </div>
          </div>
        </div>
      </div>

      <div class="label mb-3">How would you like to work?</div>
      <div class="session-cards">
        <button class="session-card active" id="cardPersonal" onclick="setMode('personal')" type="button">
          <div class="card-icon">🔒</div>
          <div class="card-label">Personal</div>
          <div class="card-desc" id="personalDesc" style="color:var(--text);opacity:.72">Just you. Saves to your account.</div>
        </button>
        <button class="session-card" id="cardShared" onclick="setMode('shared')" type="button">
          <div class="card-icon">👥</div>
          <div class="card-label">Shared</div>
          <div class="card-desc" id="sharedDesc" style="color:var(--text);opacity:.72">Invite your team to test the same checklist live.</div>
        </button>
      </div>
