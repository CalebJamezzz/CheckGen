<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Create Account — CheckGen</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="/" class="auth-logo">Check<span>Gen</span></a>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Free forever. Cloud history and shared sessions included.</p>

    <div id="reasonBanner" style="display:none;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4);font-size:clamp(12px,.82vw,14px);color:var(--green);line-height:1.5"></div>

    <button type="button" class="btn-google" onclick="signUpWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <div class="grid-2" style="gap:var(--sp-3);margin-bottom:var(--sp-3)">
      <div class="field" style="margin-bottom:0">
        <label class="field-label">Name</label>
        <input type="text" id="signupName" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field" style="margin-bottom:0">
        <label class="field-label">Organization <span style="font-family:var(--font-body);text-transform:none;letter-spacing:0;font-size:10px;color:var(--muted)">(optional)</span></label>
        <input type="text" id="signupOrg" placeholder="Acme Inc." autocomplete="organization">
      </div>
    </div>
    <div class="field">
      <label class="field-label">Email</label>
      <input type="email" id="signupEmail" placeholder="you@company.com" autocomplete="email">
    </div>
    <div class="field" style="margin-bottom:var(--sp-5)">
      <label class="field-label">Password</label>
      <input type="password" id="signupPassword" placeholder="8+ characters" autocomplete="new-password">
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:var(--sp-3)" onclick="handleSignup()">Create Free Account</button>
    <div class="status" id="signupStatus" style="margin-top:var(--sp-3)"></div>

    <div class="auth-terms">
      By creating an account you agree to our
      <a href="/terms.html">Terms of Service</a> and <a href="/privacy.html">Privacy Policy</a>.
    </div>
    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>
<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script>
(async () => {
  await redirectIfAuthed();
  const reasons = {
    history: 'Create a free account to save and access your checklist history from any device.',
    team: 'Create a free account to start and join shared team sessions.',
    account: 'Create a free account to manage your profile and preferences.'
  };
  const reason = new URLSearchParams(location.search).get('reason');
  if (reason && reasons[reason]) {
    const el = document.getElementById('reasonBanner');
    el.textContent = reasons[reason];
    el.style.display = 'block';
  }
})();

async function handleSignup() {
  const name  = document.getElementById('signupName').value.trim();
  const org   = document.getElementById('signupOrg').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pw    = document.getElementById('signupPassword').value;
  if (!name)  { showSt('signupStatus','Enter your name.','error'); return; }
  if (!email) { showSt('signupStatus','Enter your email.','error'); return; }
  if (pw.length < 8) { showSt('signupStatus','Password must be at least 8 characters.','error'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const sb = getSB();
    const { data, error } = await sb.auth.signUp({ email, password: pw });
    if (error) throw error;
    if (data?.user) {
      await updateProfile({ name, organization: org || null });
    }
    showSt('signupStatus','✓ Account created! Redirecting…','success');
    setTimeout(() => location.href = '/app/', 1200);
  } catch(e) {
    showSt('signupStatus', e.message || 'Signup failed.', 'error');
    btn.disabled = false; btn.textContent = 'Create Free Account';
  }
}

async function signUpWithGoogle() {
  await waitForSB();
  const sb = getSB();
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app/' }
  });
  if (error) showSt('signupStatus', 'Google sign-up failed: ' + error.message, 'error');
}

function showSt(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'status ' + type;
}
</script>
</body>
</html>
