<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Create Account — CheckGen</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js">
const reasons = {
  history: 'Create a free account to save and access your checklist history from any device.',
  team: 'Create a free account to start and join shared team sessions.',
  account: 'Create a free account to manage your profile and preferences.'
};
const reason = new URLSearchParams(location.search).get('reason');
if (reason && reasons[reason]) {
  const el = document.getElementById('reasonBanner');
  el.textContent = reasons[reason];
  el.style.display = 'block';
}
async function signInWithGoogle() {
  await waitForSB();
  const sb = getSB();
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app/' }
  });
  if (error) showStatus('signupStatus', 'Google sign-in failed: ' + error.message, 'error');
}
</script>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <a href="/" class="auth-logo">Check<span>Gen</span></a>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Free forever. Shared sessions and cloud history included.</p>

    <div class="grid-2" style="gap:var(--sp-3)">
      <button type="button" class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider"><span>or</span></div>
    <div class="field">
        <label class="field-label">Name</label>
        <input type="text" id="name" placeholder="Caleb" autocomplete="given-name">
      </div>
      <div class="field">
        <label class="field-label">Organization <span style="font-family:var(--font-body);text-transform:none;letter-spacing:0;color:var(--muted)">optional</span></label>
        <input type="text" id="org" placeholder="Acme Inc." autocomplete="organization">
      </div>
    </div>
    <div class="field">
      <label class="field-label">Work Email</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label class="field-label">Password</label>
      <input type="password" id="password" placeholder="8+ characters" autocomplete="new-password">
      <div class="field-hint">Minimum 8 characters.</div>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:var(--sp-4);margin-top:var(--sp-2)" id="signupBtn" onclick="handleSignup()">Create Account</button>

    <div class="status" id="status"></div>

    <p class="auth-footer">Already have an account? <a href="/login.html">Sign in</a></p>
    <p class="auth-footer" style="margin-top:var(--sp-2);font-size:clamp(11px,.72vw,12px);color:var(--muted)">By creating an account you agree to our <a href="/about.html#terms">Terms</a> and <a href="/about.html#privacy">Privacy Policy</a>.</p>
  </div>
</div>

<script>
  redirectIfAuthed();

  async function handleSignup() {
    const name     = document.getElementById('name').value.trim();
    const org      = document.getElementById('org').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('signupBtn');

    if (!name)              { showSt('Enter your name.', 'error'); return; }
    if (!email)             { showSt('Enter your email.', 'error'); return; }
    if (password.length < 8){ showSt('Password must be at least 8 characters.', 'error'); return; }

    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      await waitForSB();
      await signUp(email, password, name);
      // Update org if provided — will be set after profile is created by trigger
      if (org) localStorage.setItem('cg_pending_org', org);
      showSt('✓ Account created! Check your email to confirm, then sign in.', 'success');
      btn.textContent = 'Account Created';
      setTimeout(() => location.href = '/auth/login.html', 2000);
    } catch(e) {
      showSt(e.message || 'Sign up failed. Try again.', 'error');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  function showSt(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg; el.className = 'status ' + type;
  }

const reasons = {
  history: 'Create a free account to save and access your checklist history from any device.',
  team: 'Create a free account to start and join shared team sessions.',
  account: 'Create a free account to manage your profile and preferences.'
};

if (reason && reasons[reason]) {

}

  await waitForSB();
  const sb = getSB();
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app/' }
  });
  if (error) showStatus('signupStatus', 'Google sign-in failed: ' + error.message, 'error');
}
</script>
</body>
</html>
