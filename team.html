<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/devguard.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Team — CheckGen</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* Tabs */
    .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:var(--sp-6); }
    .tab  { padding:var(--sp-3) var(--sp-5); font-family:var(--font-mono); font-size:clamp(10px,.72vw,12px); letter-spacing:.1em; text-transform:uppercase; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none; transition:all .15s; }
    .tab.active { color:var(--green); border-bottom-color:var(--green); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    /* Member rows */
    .member-row { display:flex; align-items:center; gap:var(--sp-3); padding:var(--sp-3) 0; border-bottom:1px solid var(--border); }
    .member-row:last-child { border-bottom:none; }
    .member-av { width:38px; height:38px; border-radius:50%; background:var(--bg3); border:1px solid var(--border-md); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:15px; font-weight:700; color:var(--green); flex-shrink:0; }
    .member-info { flex:1; min-width:0; }
    .member-name  { font-size:clamp(13px,.88vw,15px); color:var(--text); }
    .member-email { font-size:clamp(11px,.72vw,13px); color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    /* Role badge */
    .role-badge { font-family:var(--font-mono); font-size:clamp(9px,.62vw,11px); letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:999px; border:1px solid; white-space:nowrap; }
    .role-badge.admin      { color:var(--green); border-color:rgba(16,185,129,.3); background:rgba(16,185,129,.08); }
    .role-badge.moderator  { color:var(--soft);  border-color:var(--border-md);    background:rgba(255,255,255,.04); }
    .role-badge.user       { color:var(--muted); border-color:var(--border);       background:rgba(255,255,255,.02); }
    .role-badge.pending    { color:var(--blocked); border-color:rgba(251,191,36,.3); background:rgba(251,191,36,.06); }
    /* Role select */
    .role-select { font-family:var(--font-mono); font-size:clamp(10px,.7vw,12px); padding:4px 8px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--soft); cursor:pointer; width:auto; flex-shrink:0; }
    /* Invite modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:500; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--bg2); border:1px solid var(--border-md); border-radius:var(--r-xl); padding:var(--sp-8); width:100%; max-width:480px; box-shadow:0 32px 80px rgba(0,0,0,.6); }
    .modal-title { font-family:var(--font-display); font-size:clamp(1.1rem,1.4vw,1.4rem); font-weight:600; color:var(--text); margin-bottom:var(--sp-2); }
    .modal-sub   { font-size:clamp(13px,.88vw,14px); color:var(--dim); margin-bottom:var(--sp-6); line-height:1.6; }
    /* Email tag input */
    .email-tags { display:flex; flex-wrap:wrap; gap:6px; padding:10px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; min-height:48px; cursor:text; transition:border-color .2s; }
    .email-tags:focus-within { border-color:rgba(16,185,129,.55); box-shadow:0 0 0 3px rgba(16,185,129,.1); }
    .email-tag  { display:inline-flex; align-items:center; gap:5px; background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25); border-radius:999px; padding:2px 10px 2px 10px; font-size:clamp(11px,.75vw,13px); color:var(--green); }
    .email-tag button { background:none; border:none; color:var(--green); cursor:pointer; padding:0; font-size:14px; line-height:1; opacity:.7; }
    .email-tag button:hover { opacity:1; }
    .email-input { flex:1; min-width:140px; background:none; border:none; outline:none; font-size:clamp(13px,.88vw,15px); color:var(--text); font-family:var(--font-body); padding:2px 0; }
    .email-input:focus { border:none; box-shadow:none; outline:none; }
    /* Team history cards */
    .team-history-card { cursor:pointer; transition:border-color .2s, transform .2s; }
    .team-history-card:hover { border-color:rgba(16,185,129,.35) !important; transform:translateY(-2px); }
  </style>
</head>
<body>
<div class="app-shell">
  <button class="mobile-nav-toggle" onclick="toggleMobileNav()">☰</button>
  <aside id="appNav"></aside>
  <main class="app-content">

    <div class="page-header">
      <h1 class="page-title" id="wsTitle">Team</h1>
      <p class="page-sub" id="wsSub">Set up your workspace and collaborate.</p>
    </div>

    <div id="teamContent"><div class="empty" style="padding:var(--sp-8)">Loading…</div></div>

  </main>
</div>

<!-- Invite modal -->
<div class="modal-overlay" id="inviteModal">
  <div class="modal-box">
    <h2 class="modal-title">Invite teammates</h2>
    <p class="modal-sub">Enter email addresses to invite. They'll receive an email with a link to join your workspace.</p>

    <div class="field" style="margin-bottom:var(--sp-4)">
      <label class="field-label">Email addresses</label>
      <div class="email-tags" id="emailTagsBox" onclick="document.getElementById('emailRawInput').focus()">
        <input type="email" id="emailRawInput" class="email-input" placeholder="name@company.com" onkeydown="handleEmailKey(event)" onblur="addEmailFromInput()">
      </div>
      <div class="field-hint" style="margin-top:6px">Press Enter or comma to add each email. Multiple emails ok.</div>
    </div>

    <div class="field" style="margin-bottom:var(--sp-6)">
      <label class="field-label">Role</label>
      <select id="inviteRoleSelect" class="role-select" style="width:100%;padding:10px 12px;border-radius:10px">
        <option value="user">User — can create checklists, sees own history only</option>
        <option value="moderator" selected>Moderator — can see all team history, can't change settings</option>
        <option value="admin">Admin — full access including settings and member management</option>
      </select>
    </div>

    <div style="display:flex;gap:var(--sp-3)">
      <button class="btn btn-primary" id="sendInviteBtn" onclick="sendInvites()" style="flex:1;justify-content:center;padding:var(--sp-3)">Send Invites →</button>
      <button class="btn btn-ghost" onclick="closeInviteModal()" style="padding:var(--sp-3) var(--sp-5)">Cancel</button>
    </div>
    <div class="status" id="inviteStatus" style="margin-top:var(--sp-3)"></div>
  </div>
</div>

<div style="text-align:center;padding:var(--sp-6) 0 var(--sp-8);margin-left:280px">
  <div style="display:flex;justify-content:center;gap:var(--sp-5);margin-bottom:var(--sp-2)">
    <a href="/terms.html" style="font-family:var(--font-mono);font-size:clamp(10px,.68vw,12px);letter-spacing:.08em;color:var(--muted);text-decoration:none">Terms of Service</a>
    <a href="/privacy.html" style="font-family:var(--font-mono);font-size:clamp(10px,.68vw,12px);letter-spacing:.08em;color:var(--muted);text-decoration:none">Privacy Policy</a>
  </div>
  <span style="font-family:var(--font-mono);font-size:clamp(10px,.68vw,12px);color:var(--muted)">© 2026 <a href="https://calebthede.com" style="color:var(--green);text-decoration:none">Caleb Thede</a></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script>
let _user, _profile, _workspace, _members = [], _invites = [], _isAdmin = false, _myRole = 'user';
let _pendingEmails = [];

const ROLES = { admin: 'Admin', moderator: 'Moderator', user: 'User' };
const ROLE_ORDER = ['admin', 'moderator', 'user'];

(async () => {
  const ctx = await initPage(true);
  if (!ctx) return;
  _user = ctx.user; _profile = ctx.profile;
  await loadWorkspace();
})();

async function loadWorkspace() {
  const sb = getSB();
  let wsId = _profile?.workspace_id;

  // Fall back to workspace_members if profile.workspace_id is out of sync
  if (!wsId) {
    const { data: mem } = await sb.from('workspace_members').select('workspace_id').eq('user_id', _user.id).limit(1).single();
    wsId = mem?.workspace_id || null;
    // Heal the profile so this doesn't happen again
    if (wsId) await sb.from('profiles').update({ workspace_id: wsId }).eq('id', _user.id).catch(() => {});
  }

  if (!wsId) { renderSetup(); return; }

  const { data: ws, error } = await sb.from('workspaces').select('*').eq('id', wsId).single();
  if (error || !ws) { renderSetup(); return; }
  _workspace = ws;

  const [{ data: members }, { data: invites }] = await Promise.all([
    sb.from('workspace_member_details').select('*').eq('workspace_id', wsId),
    sb.from('workspace_invites').select('*').eq('workspace_id', wsId).order('created_at', { ascending: false })
  ]);
  _members = members || [];
  _invites = invites || [];
  const me = _members.find(m => m.user_id === _user.id);
  _myRole = me?.role || 'user';
  _isAdmin = _myRole === 'admin';

  document.getElementById('wsTitle').textContent = ws.name;
  document.getElementById('wsSub').textContent = `${_members.length} Member${_members.length !== 1 ? 's' : ''} · ${ROLES[_myRole] || _myRole}`;
  renderWorkspace();
}

function renderSetup() {
  document.getElementById('teamContent').innerHTML = `
    <div style="max-width:560px">
      <div class="panel" style="margin-bottom:var(--sp-5)">
        <div class="section-title" style="margin-bottom:var(--sp-2)">Create your workspace</div>
        <p style="font-size:clamp(13px,.88vw,15px);color:var(--dim);line-height:1.7;margin-bottom:var(--sp-5)">
          Give your team a name. Once created, you can invite teammates by email.
        </p>
        <div class="field" style="margin-bottom:var(--sp-4)">
          <label class="field-label">Workspace name</label>
          <input type="text" id="orgNameInput" placeholder="e.g. Acme QA Team">
        </div>
        <button class="btn btn-primary" id="createWsBtn" onclick="createWorkspace()">Create Workspace →</button>
        <div class="status" id="wsStatus" style="margin-top:var(--sp-3)"></div>
      </div>
      <div class="panel" style="border-color:rgba(16,185,129,.1)">
        <div class="section-title" style="margin-bottom:var(--sp-3)">Have an invite?</div>
        <p style="font-size:clamp(13px,.88vw,15px);color:var(--dim);margin-bottom:var(--sp-4)">If a teammate sent you an invite email, open that link to join their workspace.</p>
      </div>
    </div>`;
}

function renderWorkspace() {
  const el = document.getElementById('teamContent');
  el.innerHTML = `
    <div class="tabs">
      <button class="tab active" onclick="switchTab('members')">Members</button>
      <button class="tab" onclick="switchTab('history')">Team History</button>
      ${_isAdmin || _myRole === 'moderator' ? '<button class="tab" onclick="switchTab(\'settings\')">Settings</button>' : ''}
    </div>

    <div class="tab-panel active" id="tab-members">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-4);flex-wrap:wrap;gap:var(--sp-3)">
        <div class="section-title">${_members.length} member${_members.length!==1?'s':''}</div>
        ${_isAdmin ? '<button class="btn btn-primary btn-sm" onclick="openInviteModal()">+ Invite teammates</button>' : ''}
      </div>
      <div id="memberListEl">${renderMemberList()}</div>
      ${_invites.filter(i=>i.status==='pending').length ? `
        <div id="pendingSection" style="margin-top:var(--sp-6)">
          <div class="section-title" style="margin-bottom:var(--sp-4)">Pending invites</div>
          <div id="inviteListEl">${renderInviteList()}</div>
        </div>` : ''}
    </div>

    <div class="tab-panel" id="tab-history">
      <div class="section-title" style="margin-bottom:var(--sp-3)">Team checklists</div>
      <p style="font-size:clamp(13px,.88vw,15px);color:var(--dim);margin-bottom:var(--sp-5)">
        ${_myRole === 'user' ? 'You can see checklists shared with you and your own sessions.' : 'All team sessions saved to this workspace.'}
      </p>
      <p style="font-size:clamp(11px,.75vw,12px);color:var(--muted);margin-bottom:var(--sp-4);font-family:var(--font-mono);letter-spacing:.04em">Showing the 25 most recent team sessions.</p>
      <div id="teamHistoryEl"><div class="empty" style="padding:var(--sp-6)">Loading…</div></div>
    </div>

    ${_isAdmin || _myRole === 'moderator' ? `
    <div class="tab-panel" id="tab-settings">
      <div class="panel" style="margin-bottom:var(--sp-5)">
        <div class="section-title" style="margin-bottom:var(--sp-3)">Workspace name</div>
        <div style="display:flex;gap:var(--sp-3)">
          <div class="field" style="flex:1;margin-bottom:0">
            <input type="text" id="wsNameInput" value="${esc(_workspace.name)}" ${!_isAdmin ? 'disabled style="opacity:.5"' : ''}>
          </div>
          ${_isAdmin ? '<button class="btn btn-primary" onclick="renameWorkspace()">Save</button>' : ''}
        </div>
        <div class="status" id="renameStatus" style="margin-top:var(--sp-3)"></div>
      </div>
      <div class="panel">
        <div class="section-title" style="margin-bottom:var(--sp-2)">Leave workspace</div>
        <p style="font-size:clamp(12px,.82vw,14px);color:var(--dim);margin-bottom:var(--sp-4)">Your personal checklists are unaffected.</p>
        <button class="btn btn-ghost" style="border-color:rgba(248,113,113,.3);color:var(--fail)" onclick="leaveWorkspace()">Leave Workspace</button>
        <div class="status" id="leaveStatus" style="margin-top:var(--sp-3)"></div>
      </div>
    </div>` : ''}`;

  loadTeamHistory();
}

function renderMemberList() {
  if (!_members.length) return '<div class="empty">No members yet.</div>';
  return _members.map(m => {
    const isMe = m.user_id === _user.id;
    const canManage = _isAdmin && !isMe;
    return `<div class="member-row">
      <div class="member-av">${(m.name||m.email||'?')[0].toUpperCase()}</div>
      <div class="member-info">
        <div class="member-name">${esc(m.name||'Unnamed')}${isMe?' <span style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">(you)</span>':''}</div>
        <div class="member-email">${esc(m.email||'')}</div>
      </div>
      ${canManage
        ? `<select class="role-select" style="flex-shrink:0;width:auto;max-width:130px" onchange="changeRole('${m.user_id}',this.value)">
            ${ROLE_ORDER.map(r=>`<option value="${r}"${m.role===r?' selected':''}>${ROLES[r]}</option>`).join('')}
           </select>
           <button class="btn btn-ghost btn-sm" style="color:var(--fail);border-color:rgba(248,113,113,.3);flex-shrink:0" onclick="removeMember('${m.user_id}','${esc(m.name||m.email)}')">Remove</button>`
        : `<span class="role-badge ${m.role}">${ROLES[m.role]||m.role}</span>`
      }
    </div>`;
  }).join('');
}

function renderInviteList() {
  return _invites.filter(i=>i.status==='pending').map(i=>`
    <div class="member-row">
      <div class="member-av" style="color:var(--muted);font-size:18px">✉</div>
      <div class="member-info">
        <div class="member-name">${esc(i.email)}</div>
        <div class="member-email">Invited · ${ROLES[i.role]||i.role}</div>
      </div>
      <span class="role-badge pending">Pending</span>
      ${_isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="cancelInvite('${i.id}')">Cancel</button>` : ''}
    </div>`).join('');
}

async function loadTeamHistory() {
  const el = document.getElementById('teamHistoryEl');
  if (!el) return;
  try {
    const sb = getSB();
    let query = sb.from('checklist_sessions').select('*').eq('workspace_id', _workspace.id).eq('session_type','team').order('updated_at',{ascending:false}).limit(25);
    if (_myRole === 'user') query = query.eq('user_id', _user.id);
    const { data, error } = await query;
    if (error) throw error;
    if (!data?.length) {
      el.innerHTML = `<div class="empty" style="padding:var(--sp-6)">No team sessions yet.<br><a href="/app/?mode=shared" class="btn btn-primary" style="margin-top:var(--sp-4);display:inline-flex">Start a Shared Session →</a></div>`;
      return;
    }
    el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--sp-4)">
      ${data.map(s=>{
        const items=Array.isArray(s.items)?s.items:[];
        const done=items.filter(i=>i.outcome).length;
        const pct=items.length?Math.round(done/items.length*100):0;
        return `<div class="card team-history-card" style="padding:var(--sp-4)" onclick="openTeamSession(${JSON.stringify(s).replace(/"/g,'&quot;')})">
          <div style="display:flex;justify-content:space-between;margin-bottom:var(--sp-2)">
            <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--green)">Team</div>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${new Date(s.updated_at||s.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
          </div>
          <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px">${esc(s.name||'Untitled')}</div>
          ${s.ticket_id?`<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:8px">${esc(s.ticket_id)}</div>`:''}
          ${items.length?`<div style="font-size:12px;color:var(--muted);margin-bottom:4px">${done}/${items.length} actioned</div>
          <div style="height:3px;background:var(--border);border-radius:2px"><div style="height:100%;width:${pct}%;background:var(--green)"></div></div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  } catch(e) { el.innerHTML = `<div class="status error">Failed to load: ${e.message}</div>`; }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['members','history','settings'][i]===name);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const panel = document.getElementById('tab-'+name);
  if (panel) panel.classList.add('active');
  if (name==='history') loadTeamHistory();
}

// ── Invite modal ──────────────────────────────────────────────────────────────
function openInviteModal() {
  // Full reset
  _pendingEmails = [];
  const input = document.getElementById('emailRawInput');
  if (input) input.value = '';
  // Remove all email tags (but keep the input)
  document.getElementById('emailTagsBox')
    .querySelectorAll('.email-tag').forEach(t => t.remove());
  // Reset role to default
  const roleSelect = document.getElementById('inviteRoleSelect');
  if (roleSelect) roleSelect.value = 'moderator';
  // Clear status
  const status = document.getElementById('inviteStatus');
  if (status) { status.textContent = ''; status.className = 'status'; }
  // Reset send button
  const btn = document.getElementById('sendInviteBtn');
  if (btn) { btn.disabled = false; btn.textContent = 'Send Invites →'; }
  document.getElementById('inviteModal').classList.add('open');
  setTimeout(() => { if (input) input.focus(); }, 100);
}
function closeInviteModal() { document.getElementById('inviteModal').classList.remove('open'); }

function handleEmailKey(e) {
  if (e.key === 'Enter' || e.key === ',' || e.key === ' ' || e.key === 'Tab') {
    e.preventDefault(); addEmailFromInput();
  }
  if (e.key === 'Backspace' && !e.target.value && _pendingEmails.length) {
    removeEmailTag(_pendingEmails[_pendingEmails.length-1]);
  }
}
function addEmailFromInput() {
  const raw = document.getElementById('emailRawInput').value.trim().replace(/,$/, '');
  if (!raw || !raw.includes('@')) { if (raw) return; return; }
  if (_pendingEmails.includes(raw)) { document.getElementById('emailRawInput').value=''; return; }
  _pendingEmails.push(raw);
  const tag = document.createElement('span');
  tag.className='email-tag'; tag.dataset.email=raw;
  tag.innerHTML=`${esc(raw)}<button type="button" onclick="removeEmailTag('${esc(raw)}')" tabindex="-1">×</button>`;
  document.getElementById('emailTagsBox').insertBefore(tag, document.getElementById('emailRawInput'));
  document.getElementById('emailRawInput').value = '';
}
function removeEmailTag(email) {
  _pendingEmails = _pendingEmails.filter(e=>e!==email);
  document.getElementById('emailTagsBox').querySelectorAll('.email-tag').forEach(t=>{ if(t.dataset.email===email) t.remove(); });
}

async function sendInvites() {
  addEmailFromInput(); // capture any unsaved input
  if (!_pendingEmails.length) { showSt('inviteStatus','Add at least one email address.','error'); return; }
  const role = document.getElementById('inviteRoleSelect').value;
  const btn = document.getElementById('sendInviteBtn');
  btn.disabled=true; btn.textContent='Sending…';
  const sb = getSB();
  let sent=0, failed=[];
  // Get current member emails to check for duplicates
  const memberEmails = new Set(_members.map(m => (m.email||'').toLowerCase()));
  const pendingEmails = new Set(_invites.filter(i=>i.status==='pending').map(i => (i.email||'').toLowerCase()));

  for (const email of _pendingEmails) {
    const emailLower = email.toLowerCase();
    // Check if already a member
    if (memberEmails.has(emailLower)) {
      failed.push(email + ' (already a member)');
      continue;
    }
    // Check if already has a pending invite
    if (pendingEmails.has(emailLower)) {
      failed.push(email + ' (invite already sent)');
      continue;
    }
    try {
      const { error } = await sb.from('workspace_invites').insert({
        workspace_id: _workspace.id,
        invited_by: _user.id,
        email: emailLower,
        role,
        status: 'pending',
      });
      if (error) throw error;

      // Send email via Supabase edge function OR show the invite link for now
      // Since we don't have a custom email function set up, we'll use the token-based join URL
      const { data: invite } = await sb.from('workspace_invites').select('token').eq('workspace_id',_workspace.id).eq('email',email.toLowerCase()).single();
      const joinUrl = `${location.origin}/join.html?token=${invite?.token}`;

      // Send invite email via API (calls Resend)
      try {
        const inviterName = _profile?.name || _user.email?.split('@')[0] || 'A teammate';
        const res = await fetch('/api/send-invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            to: email,
            inviterName,
            workspaceName: _workspace.name,
            inviteUrl: joinUrl
          })
        });
        const result = await res.json();
        if (result.ok) {
          sent++;
        } else if (result.reason === 'no_smtp') {
          // Resend not configured — show link for manual sharing
          sent++;
          showSt('inviteStatus', `Invite saved. No email configured — share this link manually: ${joinUrl}`, 'warn');
        } else {
          failed.push(email + ' (' + (result.error || 'send failed') + ')');
        }
      } catch(fetchErr) {
        // Function call failed — still count as saved, show link
        sent++;
        console.log('Invite link (manual share):', joinUrl);
      }
    } catch(e) { failed.push(email+' ('+e.message+')'); }
  }
  await loadWorkspace(); // reload members+invites
  btn.disabled=false; btn.textContent='Send Invites →';
  if (failed.length) {
    showSt('inviteStatus', `Sent ${sent}. Failed: ${failed.join(', ')}`, 'error');
  } else {
    showSt('inviteStatus', `✓ ${sent} invite${sent!==1?'s':''} sent!`, 'success');
    setTimeout(closeInviteModal, 1500);
  }
}

async function cancelInvite(id) {
  const sb = getSB();
  await sb.from('workspace_invites').delete().eq('id', id);
  _invites = _invites.filter(i => i.id !== id);

  const pending = _invites.filter(i => i.status === 'pending');
  if (pending.length === 0) {
    // Remove the whole pending section from DOM
    const section = document.getElementById('pendingSection');
    if (section) section.remove();
  } else {
    const el = document.getElementById('inviteListEl');
    if (el) el.innerHTML = renderInviteList();
  }
}

async function changeRole(userId, newRole) {
  const sb = getSB();
  const { error } = await sb.from('workspace_members').update({role:newRole}).eq('workspace_id',_workspace.id).eq('user_id',userId);
  if (error) { alert('Failed: '+error.message); return; }
  _members = _members.map(m=>m.user_id===userId?{...m,role:newRole}:m);
  document.getElementById('memberListEl').innerHTML = renderMemberList();
}

async function removeMember(userId, name) {
  if (!confirm(`Remove ${name} from the workspace?`)) return;
  const sb = getSB();
  await sb.from('workspace_members').delete().eq('workspace_id',_workspace.id).eq('user_id',userId);
  _members = _members.filter(m=>m.user_id!==userId);
  document.getElementById('wsTitle').textContent = _workspace.name;
  document.getElementById('wsSub').textContent = `${_members.length} member${_members.length!==1?'s':''} · ${ROLES[_myRole]}`;
  document.getElementById('memberListEl').innerHTML = renderMemberList();
}

async function createWorkspace() {
  const name = document.getElementById('orgNameInput')?.value.trim();
  if (!name) { showSt('wsStatus','Enter a workspace name.','error'); return; }
  const btn = document.getElementById('createWsBtn');
  btn.disabled=true; btn.textContent='Creating…';
  try {
    const sb = getSB();
    const { data: ws, error: wsErr } = await sb.from('workspaces').insert({name,owner_id:_user.id}).select().single();
    if (wsErr) throw wsErr;
    await sb.from('workspace_members').insert({workspace_id:ws.id,user_id:_user.id,role:'admin'});
    await updateProfile({workspace_id:ws.id,organization:name,role:'admin',updated_at:new Date().toISOString()});
    _profile = {..._profile,workspace_id:ws.id,organization:name,role:'admin'};
    showSt('wsStatus','✓ Workspace created!','success');
    setTimeout(()=>loadWorkspace(),800);
  } catch(e) { showSt('wsStatus','Failed: '+e.message,'error'); btn.disabled=false; btn.textContent='Create Workspace →'; }
}

async function renameWorkspace() {
  const name = document.getElementById('wsNameInput')?.value.trim();
  if (!name) return;
  const sb = getSB();
  const { error } = await sb.from('workspaces').update({name}).eq('id',_workspace.id);
  if (error) { showSt('renameStatus','Failed: '+error.message,'error'); return; }
  await updateProfile({organization:name});
  _workspace.name=name;
  document.getElementById('wsTitle').textContent=name;
  showSt('renameStatus','✓ Renamed!','success');
}

async function leaveWorkspace() {
  if (!confirm('Leave this workspace?')) return;
  const sb = getSB();
  await sb.from('workspace_members').delete().eq('workspace_id',_workspace.id).eq('user_id',_user.id);
  await updateProfile({workspace_id:null,organization:null,role:'user'});
  _workspace=null; _members=[]; renderSetup();
}

function showSt(id,msg,type) { const el=document.getElementById(id); if(el){el.textContent=msg;el.className='status '+type;} }
function openTeamSession(s) {
  try {
    sessionStorage.setItem('cg_restore_session', JSON.stringify({
      id:           s.id,
      name:         s.name,
      ticket_id:    s.ticket_id,
      environment:  s.environment,
      items:        s.items,
      session_type: s.session_type,
      share_code:   s.share_code || s.code || null,
    }));
    location.href = '/app/';
  } catch(e) {}
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Close modal on overlay click
document.getElementById('inviteModal').addEventListener('click', function(e) { if(e.target===this) closeInviteModal(); });
</script>
