<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Checklist — CheckGen</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { background: var(--bg); color: var(--text); }
    .view-shell { max-width: 820px; margin: 0 auto; padding: var(--sp-8) var(--sp-6) var(--sp-16); }

    /* Header */
    .view-header { padding: var(--sp-8) 0 var(--sp-6); border-bottom: 1px solid var(--border); margin-bottom: var(--sp-8); }
    .view-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; margin-bottom: var(--sp-6); }
    .view-logo span { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text); }
    .view-logo span em { color: var(--green); font-style: normal; }
    .view-title { font-family: var(--font-display); font-size: clamp(1.4rem, 2.5vw, 2rem); font-weight: 700; color: var(--text); margin-bottom: var(--sp-3); }
    .view-meta { display: flex; flex-wrap: wrap; gap: var(--sp-3) var(--sp-5); margin-bottom: var(--sp-5); }
    .view-meta-item { font-family: var(--font-mono); font-size: clamp(10px, .72vw, 12px); letter-spacing: .08em; color: var(--soft); }
    .view-meta-item strong { color: var(--dim); font-weight: 500; }

    /* Stats bar */
    .view-stats { display: flex; flex-wrap: wrap; gap: var(--sp-3); margin-bottom: var(--sp-6); }
    .view-stat { display: flex; flex-direction: column; gap: 3px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; min-width: 80px; }
    .view-stat-val { font-family: var(--font-display); font-size: clamp(1.1rem, 1.6vw, 1.4rem); font-weight: 700; color: var(--text); }
    .view-stat-val.pass    { color: var(--green); }
    .view-stat-val.fail    { color: var(--fail); }
    .view-stat-val.blocked { color: var(--blocked); }
    .view-stat-label { font-family: var(--font-mono); font-size: clamp(9px, .65vw, 11px); letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

    /* Sections */
    .view-section { margin-bottom: var(--sp-8); }
    .view-section-title { font-family: var(--font-mono); font-size: clamp(10px, .72vw, 12px); letter-spacing: .14em; text-transform: uppercase; color: var(--green); margin-bottom: var(--sp-3); padding-bottom: var(--sp-2); border-bottom: 1px solid rgba(16,185,129,.15); }

    /* Items */
    .view-item { display: grid; grid-template-columns: 24px 1fr auto; gap: var(--sp-3); align-items: start; padding: var(--sp-3) 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .view-item:last-child { border-bottom: none; }
    .view-item-num { font-family: var(--font-mono); font-size: 11px; color: var(--muted); padding-top: 2px; }
    .view-item-body { display: flex; flex-direction: column; gap: 5px; }
    .view-item-text { font-size: clamp(13px, .9vw, 14px); color: var(--text); line-height: 1.6; }
    .view-item-arrow { color: var(--green); opacity: .7; }
    .view-item-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .view-item-tag { font-family: var(--font-mono); font-size: clamp(9px, .62vw, 10px); letter-spacing: .08em; padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: rgba(255,255,255,.02); }
    .view-item-note { font-size: clamp(12px, .82vw, 13px); color: var(--soft); line-height: 1.5; background: rgba(255,255,255,.03); border-left: 2px solid var(--border-md); padding: 6px 10px; border-radius: 0 6px 6px 0; margin-top: 4px; }
    .view-outcome { display: flex; align-items: center; }
    .view-badge { font-family: var(--font-mono); font-size: clamp(9px, .62vw, 10px); letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; border: 1px solid; white-space: nowrap; }
    .view-badge.pass    { color: var(--green);   border-color: rgba(16,185,129,.3);  background: rgba(16,185,129,.08); }
    .view-badge.fail    { color: var(--fail);    border-color: rgba(239,68,68,.3);   background: rgba(239,68,68,.08); }
    .view-badge.blocked { color: var(--blocked); border-color: rgba(251,191,36,.3);  background: rgba(251,191,36,.08); }
    .view-badge.not-run { color: var(--muted);   border-color: var(--border);        background: transparent; }

    /* CTA */
    .view-cta { text-align: center; padding: var(--sp-10) 0 var(--sp-6); border-top: 1px solid var(--border); margin-top: var(--sp-10); }
    .view-cta p { font-size: clamp(13px, .9vw, 14px); color: var(--dim); margin-bottom: var(--sp-4); }

    /* States */
    .view-loading { text-align: center; padding: var(--sp-16) 0; color: var(--soft); font-family: var(--font-mono); font-size: 13px; }
    .view-error   { text-align: center; padding: var(--sp-16) 0; color: var(--muted); }
    .view-error h2 { font-size: 1.2rem; margin-bottom: var(--sp-3); color: var(--dim); }
    .view-error p  { font-size: 14px; line-height: 1.6; }

    @media (max-width: 600px) {
      .view-shell { padding: var(--sp-5) var(--sp-4) var(--sp-12); }
      .view-item { grid-template-columns: 20px 1fr; }
      .view-outcome { display: none; }
    }
  </style>
</head>
<body>
<div class="view-shell">
  <div id="viewContent">
    <div class="view-loading">Loading checklist…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/supabase.js"></script>
<script>
(async function() {
  const params = new URLSearchParams(location.search);
  const token = params.get('t');
  const el = document.getElementById('viewContent');

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatText(text) {
    // Split on → and style each part
    const parts = String(text || '').split('→');
    if (parts.length < 2) return esc(text);
    return esc(parts[0].trim()) +
      ' <span class="view-item-arrow">→</span> ' +
      esc(parts.slice(1).join('→').trim());
  }

  function outcomeLabel(outcome) {
    if (!outcome) return '<span class="view-badge not-run">Not Run</span>';
    const map = { pass: 'Pass', fail: 'Fail', blocked: 'Blocked' };
    return `<span class="view-badge ${outcome}">${map[outcome] || outcome}</span>`;
  }

  if (!token) {
    el.innerHTML = `<div class="view-error"><h2>Invalid link</h2><p>This link is missing a valid token. Ask the sender to copy the link again from CheckGen.</p></div>`;
    return;
  }

  try {
    const sb = getSB();
    const { data: rows, error } = await sb
      .from('checklist_sessions')
      .select('*')
      .eq('view_token', token)
      .limit(1);

    if (error || !rows || !rows.length) {
      el.innerHTML = `<div class="view-error"><h2>Checklist not found</h2><p>This link may have expired or the checklist has been removed.</p></div>`;
      return;
    }

    const sess = rows[0];
    const items = sess.items || [];

    // Stats
    const total   = items.length;
    const passed  = items.filter(i => i.outcome === 'pass').length;
    const failed  = items.filter(i => i.outcome === 'fail').length;
    const blocked = items.filter(i => i.outcome === 'blocked').length;
    const notRun  = items.filter(i => !i.outcome).length;
    const completed = passed + failed + blocked;
    const passRate = completed > 0 ? Math.round((passed / completed) * 100) + '%' : '—';

    // Group by section
    const sectionOrder = [];
    const sections = {};
    items.forEach(item => {
      const sec = item.section || 'General';
      if (!sections[sec]) { sections[sec] = []; sectionOrder.push(sec); }
      sections[sec].push(item);
    });

    // Meta
    const metaParts = [];
    if (sess.ticket_id)  metaParts.push(`<span class="view-meta-item"><strong>Ticket</strong> ${esc(sess.ticket_id)}</span>`);
    if (sess.environment) metaParts.push(`<span class="view-meta-item"><strong>Environment</strong> ${esc(sess.environment)}</span>`);
    const dateStr = new Date(sess.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    metaParts.push(`<span class="view-meta-item"><strong>Date</strong> ${dateStr}</span>`);
    metaParts.push(`<span class="view-meta-item"><strong>${total}</strong> test cases</span>`);

    // Build sections HTML
    let sectionsHtml = '';
    let counter = 1;
    sectionOrder.forEach(sec => {
      const secItems = sections[sec];
      let itemsHtml = '';
      secItems.forEach(item => {
        const tags = [];
        if (item.priority) tags.push(item.priority);
        if (item.type)     tags.push(item.type);
        if (item.time)     tags.push(item.time + ' min');
        itemsHtml += `
          <div class="view-item">
            <div class="view-item-num">${counter++}</div>
            <div class="view-item-body">
              <div class="view-item-text">${formatText(item.text)}</div>
              ${tags.length ? `<div class="view-item-tags">${tags.map(t => `<span class="view-item-tag">${esc(t)}</span>`).join('')}</div>` : ''}
              ${item.note ? `<div class="view-item-note">✎ ${esc(item.note)}</div>` : ''}
            </div>
            <div class="view-outcome">${outcomeLabel(item.outcome)}</div>
          </div>`;
      });
      sectionsHtml += `
        <div class="view-section">
          <div class="view-section-title">${esc(sec)}</div>
          ${itemsHtml}
        </div>`;
    });

    const title = sess.name || sess.ticket_id || 'Checklist';

    el.innerHTML = `
      <div class="view-header">
        <a href="/" class="view-logo">
          <svg width="20" height="20" viewBox="0 0 32 32" fill="none"><rect x="5" y="4" width="15" height="19" rx="2.5" fill="none" stroke="#f2f0fc" stroke-width="1.2" opacity="0.65"/><line x1="8.5" y1="9" x2="16.5" y2="9" stroke="#f2f0fc" stroke-width="1.1" stroke-linecap="round" opacity="0.8"/><line x1="8.5" y1="12.5" x2="16.5" y2="12.5" stroke="#f2f0fc" stroke-width="1.1" stroke-linecap="round" opacity="0.8"/><line x1="8.5" y1="16" x2="13.5" y2="16" stroke="#f2f0fc" stroke-width="1.1" stroke-linecap="round" opacity="0.8"/><circle cx="22" cy="22" r="9" fill="#080b12"/><circle cx="22" cy="22" r="8" fill="#10b981"/><polyline points="18,22 21,25 26,17" stroke="#080b12" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <span>Check<em>Gen</em></span>
        </a>
        <div class="view-title">${esc(title)}</div>
        <div class="view-meta">${metaParts.join('')}</div>
        <div class="view-stats">
          <div class="view-stat"><div class="view-stat-val">${total}</div><div class="view-stat-label">Total</div></div>
          <div class="view-stat"><div class="view-stat-val pass">${passed}</div><div class="view-stat-label">Passed</div></div>
          <div class="view-stat"><div class="view-stat-val fail">${failed}</div><div class="view-stat-label">Failed</div></div>
          <div class="view-stat"><div class="view-stat-val blocked">${blocked}</div><div class="view-stat-label">Blocked</div></div>
          <div class="view-stat"><div class="view-stat-val">${notRun}</div><div class="view-stat-label">Not Run</div></div>
          <div class="view-stat"><div class="view-stat-val">${passRate}</div><div class="view-stat-label">Pass Rate</div></div>
        </div>
      </div>

      ${sectionsHtml}

      <div class="view-cta">
        <p>Generated with CheckGen — AI-powered QA test checklists.</p>
        <a href="/app/" class="btn btn-primary" style="font-size:14px;padding:10px 24px">Try CheckGen →</a>
      </div>`;

    // Update page title
    document.title = `${title} — CheckGen`;

  } catch(e) {
    el.innerHTML = `<div class="view-error"><h2>Something went wrong</h2><p>${esc(e.message)}</p></div>`;
  }
})();
</script>
</body>
</html>
